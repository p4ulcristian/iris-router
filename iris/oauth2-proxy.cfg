# oauth2-proxy config — live file at /etc/oauth2-proxy.cfg
# Reference copy only, do NOT commit real secrets

provider = "oidc"
oidc_issuer_url = "https://auth.irisdoes.work"
client_id = "<pocket-id-client-id>"
client_secret = "<pocket-id-client-secret>"

redirect_url = "https://oauth2.irisdoes.work/oauth2/callback"
http_address = "127.0.0.1:4180"

cookie_secret = "<32-byte-hex: openssl rand -hex 16>"
cookie_domains = [".irisdoes.work"]
cookie_expire = "24h"
cookie_refresh = "1h"
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
cookie_name = "__Host-_oauth2_proxy"

whitelist_domains = [".irisdoes.work"]
email_domains = ["*"]

reverse_proxy = true
skip_provider_button = true
upstreams = ["static://202"]
